<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Narrative Dashboard</title>
    <style>
      :root { font-family: Arial, sans-serif; color-scheme: dark; }
      body { margin: 0; padding: 1rem; background: #111827; color: #e5e7eb; }
      h1, h2 { margin: 0 0 0.75rem; }
      .header { display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1rem; margin-top: 1rem; }
      .card { background: #1f2937; border: 1px solid #374151; border-radius: 10px; padding: 1rem; }
      .item { border-bottom: 1px solid #374151; padding: 0.5rem 0; }
      .item:last-child { border-bottom: 0; }
      .pill { display: inline-block; margin-left: 0.5rem; padding: 0.12rem 0.45rem; border-radius: 999px; font-size: 0.8rem; background: #374151; }
      .harmful { background: #7f1d1d; }
      input, button, textarea, select { width: 100%; margin: 0.25rem 0 0.5rem; background: #111827; color: #e5e7eb; border: 1px solid #4b5563; border-radius: 6px; padding: 0.45rem; }
      button { cursor: pointer; background: #2563eb; border: 0; }
      small { color: #9ca3af; }
      .hidden { display: none; }
      .row { display: flex; gap: 0.5rem; align-items: center; }
      .row button { width: auto; margin: 0; }
      .toolbar { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
      .toolbar button { width: auto; }
    </style>
  </head>
  <body>
    <div class="header">
      <div>
        <h1>Narrative Dashboard</h1>
        <small id="identity">Loading session...</small>
      </div>
      <div class="row">
        <button id="logoutBtn">Logout</button>
      </div>
    </div>

    <div class="grid">
      <section class="card">
        <h2>Ingest Mention</h2>
        <form id="mentionForm">
          <input name="platform" placeholder="Platform (x, facebook, whatsapp)" required />
          <input name="author_handle" placeholder="@handle" required />
          <input name="author_name" placeholder="Author Name" />
          <input name="followers" type="number" value="0" />
          <input name="engagement_rate" type="number" step="0.01" value="0.1" />
          <input name="constituency" value="central" />
          <textarea name="content" placeholder="Mention text..." required></textarea>
          <button type="submit">Submit Mention</button>
        </form>
      </section>

      <section class="card">
        <h2>Create Campaign</h2>
        <form id="campaignForm">
          <input name="name" placeholder="Campaign Name" required />
          <input name="constituency" value="central" />
          <textarea name="message" placeholder="Counter-message..." required></textarea>
          <button type="submit">Create Campaign</button>
        </form>
      </section>

      <section class="card hidden" id="scanSection">
        <h2>Scan All Platforms</h2>
        <form id="scanForm">
          <input name="constituency" value="central" />
          <input name="platforms" placeholder="x,facebook,whatsapp,instagram,telegram,tiktok" />
          <input name="batch_size_per_platform" type="number" min="1" max="20" value="2" />
          <button type="submit">Run Scan</button>
        </form>
        <small id="scanResult"></small>
      </section>

      <section class="card">
        <h2>Campaigns</h2>
        <div class="toolbar">
          <button id="refreshCampaigns">Refresh Campaigns</button>
        </div>
        <div id="campaignsList"></div>
      </section>

      <section class="card">
        <h2>Outreach Tasks</h2>
        <form id="createOutreachForm">
          <input name="campaign_id" type="number" placeholder="Campaign ID" required />
          <input name="kol_handles" placeholder="@alpha,@beta" required />
          <input name="notes" placeholder="Outreach notes" />
          <button type="submit">Create Outreach Tasks</button>
        </form>
        <div class="toolbar">
          <input id="outreachCampaignId" type="number" placeholder="Campaign ID to view" />
          <button id="loadOutreach">Load Tasks</button>
        </div>
        <div id="outreachList"></div>
      </section>

      <section class="card">
        <h2>Update Outreach Status</h2>
        <form id="updateOutreachForm">
          <input name="task_id" type="number" placeholder="Task ID" required />
          <select name="status" required>
            <option value="pending">pending</option>
            <option value="contacted">contacted</option>
            <option value="completed">completed</option>
            <option value="failed">failed</option>
          </select>
          <input name="notes" placeholder="Status notes" />
          <button type="submit">Update Task</button>
        </form>
      </section>

      <section class="card hidden" id="adminControls">
        <h2>Admin Controls</h2>
        <input id="connectorName" placeholder="Connector key name" />
        <input id="connectorPlatform" placeholder="Connector platform (x, facebook, ...)" />
        <button id="createConnectorKey">Create Connector Key</button>
        <small id="connectorKeyResult"></small>
        <div class="toolbar">
          <button id="listConnectorKeys">List Connector Keys</button>
        </div>
        <div id="connectorKeysList"></div>
      </section>

      <section class="card hidden" id="alertEndpointsSection">
        <h2>Alert Endpoints</h2>
        <form id="createAlertEndpointForm">
          <input name="name" placeholder="Endpoint name" required />
          <input name="url" placeholder="https://example.com/webhook" required />
          <input name="min_harmful_score" type="number" min="0" max="1" step="0.1" value="0.8" />
          <button type="submit">Create Alert Endpoint</button>
        </form>
        <div class="toolbar">
          <button id="listAlertEndpoints">List Alert Endpoints</button>
        </div>
        <div id="alertEndpointsList"></div>
      </section>

      <section class="card hidden" id="auditSection">
        <h2>Audit Logs</h2>
        <div class="toolbar">
          <button id="loadAuditLogs">Load Audit Logs</button>
        </div>
        <div id="auditLogsList"></div>
      </section>
    </div>

    <div class="grid">
      <section class="card">
        <h2>Live Mention Feed</h2>
        <div id="mentions"></div>
      </section>
      <section class="card">
        <h2>Harmful Alerts</h2>
        <div id="alerts"></div>
      </section>
      <section class="card">
        <h2>KOL Leaderboard</h2>
        <div class="toolbar">
          <button id="refreshKols">Refresh KOLs</button>
        </div>
        <div id="kols"></div>
      </section>

      <section class="card">
        <h2>KOL Rescore</h2>
        <form id="rescoreForm">
          <input name="constituency" placeholder="Constituency" value="central" required />
          <button type="submit">Rescore Constituency</button>
        </form>
        <small id="rescoreResult"></small>
      </section>
    </div>

    <script>
      const token = localStorage.getItem("narrative_token") || "";
      if (!token) window.location.replace("/login");

      const identityEl = document.getElementById("identity");
      const mentionsEl = document.getElementById("mentions");
      const alertsEl = document.getElementById("alerts");
      const kolsEl = document.getElementById("kols");
      const campaignsListEl = document.getElementById("campaignsList");
      const outreachListEl = document.getElementById("outreachList");
      const scanSectionEl = document.getElementById("scanSection");
      const scanResultEl = document.getElementById("scanResult");
      const adminControlsEl = document.getElementById("adminControls");
      const connectorKeyResultEl = document.getElementById("connectorKeyResult");
      const connectorKeysListEl = document.getElementById("connectorKeysList");
      const alertEndpointsSectionEl = document.getElementById("alertEndpointsSection");
      const alertEndpointsListEl = document.getElementById("alertEndpointsList");
      const auditSectionEl = document.getElementById("auditSection");
      const auditLogsListEl = document.getElementById("auditLogsList");
      const refreshKolsButton = document.getElementById("refreshKols");
      const rescoreResultEl = document.getElementById("rescoreResult");
      let currentRole = "";
      let stream = null;

      function esc(text) {
        return String(text).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
      }

      function clearSessionAndRedirect() {
        if (stream) stream.close();
        localStorage.removeItem("narrative_token");
        window.location.replace("/login");
      }

      async function api(path, options = {}) {
        const headers = Object.assign({}, options.headers || {}, { Authorization: `Bearer ${token}` });
        const res = await fetch(path, { ...options, headers });
        if (!res.ok) {
          let detail = `Request failed ${res.status}`;
          try {
            const payload = await res.json();
            if (payload.detail) detail = payload.detail;
          } catch (_) {}
          if (res.status === 401) {
            clearSessionAndRedirect();
            throw new Error("Session expired");
          }
          throw new Error(detail);
        }
        return res;
      }

      async function loadMentions() {
        const res = await api("/api/monitoring/mentions");
        const data = await res.json();
        mentionsEl.innerHTML = data.map((row) => `
          <div class="item">
            <b>${esc(row.author_handle)}</b> on ${esc(row.platform)}
            ${row.is_harmful ? '<span class="pill harmful">harmful</span>' : ""}
            <div>${esc(row.content)}</div>
            <small>topic=${esc(row.topic)} sentiment=${row.sentiment_score} harmful=${row.harmful_claim_score}</small>
          </div>
        `).join("");
      }

      async function loadAlerts() {
        const res = await api("/api/monitoring/alerts");
        const data = await res.json();
        alertsEl.innerHTML = data.map((row) => `
          <div class="item">
            <b>${esc(row.author_handle)}</b> ${esc(row.platform)}
            <span class="pill harmful">harmful=${row.harmful_claim_score}</span>
            <div>${esc(row.content)}</div>
          </div>
        `).join("");
      }

      async function loadKols() {
        const res = await api("/api/kols/leaderboard");
        const data = await res.json();
        kolsEl.innerHTML = data.map((row) => `
          <div class="item">
            <b>${esc(row.handle)}</b><span class="pill">${esc(row.tier)}</span>
            <div>${esc(row.constituency)} | score=${row.influence_score} | followers=${row.followers}</div>
          </div>
        `).join("");
      }

      async function loadCampaigns() {
        const res = await api("/api/campaigns");
        const data = await res.json();
        campaignsListEl.innerHTML = data.length ? data.map((row) => `
          <div class="item">
            <b>#${row.id}</b> ${esc(row.name)}
            <div>${esc(row.constituency)}</div>
            <small>${esc(row.message)}</small>
          </div>
        `).join("") : "<small>No campaigns yet.</small>";
      }

      async function loadOutreach(campaignId) {
        const res = await api(`/api/campaigns/${campaignId}/outreach`);
        const data = await res.json();
        outreachListEl.innerHTML = data.length ? data.map((row) => `
          <div class="item">
            <b>Task #${row.id}</b> ${esc(row.kol_handle)}
            <span class="pill">${esc(row.status)}</span>
            <div><small>${esc(row.notes || "")}</small></div>
          </div>
        `).join("") : "<small>No outreach tasks yet.</small>";
      }

      async function listConnectorKeys() {
        const res = await api("/api/admin/connector-keys");
        const data = await res.json();
        connectorKeysListEl.innerHTML = data.length ? data.map((row) => `
          <div class="item">
            <b>${esc(row.name)}</b> ${esc(row.platform)}
            <small>${esc(row.token_preview)}</small>
          </div>
        `).join("") : "<small>No connector keys yet.</small>";
      }

      async function listAlertEndpoints() {
        const res = await api("/api/admin/alert-endpoints");
        const data = await res.json();
        alertEndpointsListEl.innerHTML = data.length ? data.map((row) => `
          <div class="item">
            <b>${esc(row.name)}</b>
            <div><small>${esc(row.url)}</small></div>
            <small>min score: ${row.min_harmful_score}</small>
          </div>
        `).join("") : "<small>No alert endpoints yet.</small>";
      }

      async function loadAuditLogs() {
        const res = await api("/api/admin/audit-logs");
        const data = await res.json();
        auditLogsListEl.innerHTML = data.length ? data.map((row) => `
          <div class="item">
            <b>${esc(row.actor_email)}</b> ${esc(row.action)}
            <small>${esc(row.resource_type)} #${esc(row.resource_id || "")}</small>
          </div>
        `).join("") : "<small>No audit logs yet.</small>";
      }

      async function refreshAll() {
        await Promise.all([loadMentions(), loadAlerts(), loadKols(), loadCampaigns()]);
      }

      function connectStream() {
        if (stream) stream.close();
        stream = new EventSource(`/api/monitoring/stream?token=${encodeURIComponent(token)}`);
        stream.onmessage = (event) => {
          const data = JSON.parse(event.data);
          if (data.type === "mention_ingested") refreshAll().catch(console.error);
        };
        stream.onerror = () => {
          if (stream) stream.close();
          stream = null;
        };
      }

      document.getElementById("logoutBtn").addEventListener("click", clearSessionAndRedirect);

      document.getElementById("mentionForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
          const payload = Object.fromEntries(new FormData(e.target).entries());
          payload.followers = Number(payload.followers || 0);
          payload.engagement_rate = Number(payload.engagement_rate || 0);
          await api("/api/mentions", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          e.target.reset();
          await refreshAll();
        } catch (err) {
          alert(err.message);
        }
      });

      document.getElementById("campaignForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
          const payload = Object.fromEntries(new FormData(e.target).entries());
          await api("/api/campaigns", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          e.target.reset();
          alert("Campaign created");
          await loadCampaigns();
        } catch (err) {
          alert(err.message);
        }
      });

      document.getElementById("refreshCampaigns").addEventListener("click", () => {
        loadCampaigns().catch((err) => alert(err.message));
      });

      document.getElementById("createOutreachForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
          const payload = Object.fromEntries(new FormData(e.target).entries());
          const campaignId = Number(payload.campaign_id);
          const kolHandles = String(payload.kol_handles || "")
            .split(",")
            .map((x) => x.trim())
            .filter(Boolean);
          await api(`/api/campaigns/${campaignId}/outreach`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ kol_handles: kolHandles, notes: payload.notes || "" }),
          });
          e.target.reset();
          document.getElementById("outreachCampaignId").value = String(campaignId);
          await loadOutreach(campaignId);
        } catch (err) {
          alert(err.message);
        }
      });

      document.getElementById("loadOutreach").addEventListener("click", async () => {
        try {
          const campaignId = Number(document.getElementById("outreachCampaignId").value);
          if (!campaignId) return alert("Enter a campaign ID");
          await loadOutreach(campaignId);
        } catch (err) {
          alert(err.message);
        }
      });

      document.getElementById("updateOutreachForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
          const payload = Object.fromEntries(new FormData(e.target).entries());
          const taskId = Number(payload.task_id);
          await api(`/api/campaigns/outreach/${taskId}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ status: payload.status, notes: payload.notes || "" }),
          });
          alert("Outreach task updated");
        } catch (err) {
          alert(err.message);
        }
      });

      refreshKolsButton.addEventListener("click", () => {
        loadKols().catch((err) => alert(err.message));
      });

      document.getElementById("rescoreForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
          const constituency = new FormData(e.target).get("constituency");
          const res = await api(`/api/kols/rescore?constituency=${encodeURIComponent(constituency)}`, {
            method: "POST",
          });
          const data = await res.json();
          rescoreResultEl.textContent = `Rescored ${data.rescored} KOLs in ${data.constituency}`;
          await loadKols();
        } catch (err) {
          alert(err.message);
        }
      });

      document.getElementById("scanForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
          const payload = Object.fromEntries(new FormData(e.target).entries());
          payload.batch_size_per_platform = Number(payload.batch_size_per_platform || 2);
          payload.platforms = String(payload.platforms || "")
            .split(",")
            .map((x) => x.trim())
            .filter(Boolean);
          if (!payload.platforms.length) payload.platforms = ["x", "facebook", "whatsapp", "instagram", "telegram", "tiktok"];
          const res = await api("/api/connectors/scan-all", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          scanResultEl.textContent = `Scanned ${data.scanned_platforms.join(", ")} and created ${data.mentions_created} mentions`;
          await refreshAll();
        } catch (err) {
          alert(err.message);
        }
      });

      document.getElementById("createConnectorKey").addEventListener("click", async () => {
        try {
          const name = document.getElementById("connectorName").value.trim();
          const platform = document.getElementById("connectorPlatform").value.trim();
          if (!name || !platform) return alert("Connector name and platform are required");
          const res = await api("/api/admin/connector-keys", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, platform }),
          });
          const data = await res.json();
          connectorKeyResultEl.textContent = `Key created: ${data.name} token=${data.token}`;
          await listConnectorKeys();
        } catch (err) {
          alert(err.message);
        }
      });

      document.getElementById("listConnectorKeys").addEventListener("click", () => {
        listConnectorKeys().catch((err) => alert(err.message));
      });

      document.getElementById("createAlertEndpointForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
          const payload = Object.fromEntries(new FormData(e.target).entries());
          payload.min_harmful_score = Number(payload.min_harmful_score || 0.8);
          await api("/api/admin/alert-endpoints", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          e.target.reset();
          await listAlertEndpoints();
        } catch (err) {
          alert(err.message);
        }
      });

      document.getElementById("listAlertEndpoints").addEventListener("click", () => {
        listAlertEndpoints().catch((err) => alert(err.message));
      });

      document.getElementById("loadAuditLogs").addEventListener("click", () => {
        loadAuditLogs().catch((err) => alert(err.message));
      });

      async function bootstrap() {
        try {
          const meRes = await api("/api/auth/me");
          const me = await meRes.json();
          currentRole = me.role || "";
          identityEl.textContent = `Logged in as ${me.email} (${currentRole})`;
          adminControlsEl.classList.toggle("hidden", currentRole !== "admin");
          scanSectionEl.classList.toggle("hidden", !["admin", "coordinator", "analyst"].includes(currentRole));
          alertEndpointsSectionEl.classList.toggle("hidden", currentRole !== "admin");
          auditSectionEl.classList.toggle("hidden", currentRole !== "admin");
          await refreshAll();
          if (currentRole === "admin") {
            await Promise.all([listConnectorKeys(), listAlertEndpoints()]);
          }
          connectStream();
        } catch (err) {
          clearSessionAndRedirect();
        }
      }

      bootstrap();
    </script>
  </body>
</html>
