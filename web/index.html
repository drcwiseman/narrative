<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Narrative Dashboard</title>
    <style>
      :root { font-family: Arial, sans-serif; color-scheme: dark; }
      body { margin: 0; padding: 1rem; background: #111827; color: #e5e7eb; }
      h1, h2 { margin: 0 0 0.75rem; }
      .header { display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1rem; margin-top: 1rem; }
      .card { background: #1f2937; border: 1px solid #374151; border-radius: 10px; padding: 1rem; }
      .item { border-bottom: 1px solid #374151; padding: 0.5rem 0; }
      .item:last-child { border-bottom: 0; }
      .pill { display: inline-block; margin-left: 0.5rem; padding: 0.12rem 0.45rem; border-radius: 999px; font-size: 0.8rem; background: #374151; }
      .harmful { background: #7f1d1d; }
      input, button, textarea { width: 100%; margin: 0.25rem 0 0.5rem; background: #111827; color: #e5e7eb; border: 1px solid #4b5563; border-radius: 6px; padding: 0.45rem; }
      button { cursor: pointer; background: #2563eb; border: 0; }
      small { color: #9ca3af; }
      .hidden { display: none; }
      .row { display: flex; gap: 0.5rem; align-items: center; }
      .row button { width: auto; margin: 0; }
    </style>
  </head>
  <body>
    <div class="header">
      <div>
        <h1>Narrative Dashboard</h1>
        <small id="identity">Loading session...</small>
      </div>
      <div class="row">
        <button id="logoutBtn">Logout</button>
      </div>
    </div>

    <div class="grid">
      <section class="card">
        <h2>Ingest Mention</h2>
        <form id="mentionForm">
          <input name="platform" placeholder="Platform (x, facebook, whatsapp)" required />
          <input name="author_handle" placeholder="@handle" required />
          <input name="author_name" placeholder="Author Name" />
          <input name="followers" type="number" value="0" />
          <input name="engagement_rate" type="number" step="0.01" value="0.1" />
          <input name="constituency" value="central" />
          <textarea name="content" placeholder="Mention text..." required></textarea>
          <button type="submit">Submit Mention</button>
        </form>
      </section>

      <section class="card">
        <h2>Create Campaign</h2>
        <form id="campaignForm">
          <input name="name" placeholder="Campaign Name" required />
          <input name="constituency" value="central" />
          <textarea name="message" placeholder="Counter-message..." required></textarea>
          <button type="submit">Create Campaign</button>
        </form>
      </section>

      <section class="card hidden" id="scanSection">
        <h2>Scan All Platforms</h2>
        <form id="scanForm">
          <input name="constituency" value="central" />
          <input name="platforms" placeholder="x,facebook,whatsapp,instagram,telegram,tiktok" />
          <input name="batch_size_per_platform" type="number" min="1" max="20" value="2" />
          <button type="submit">Run Scan</button>
        </form>
        <small id="scanResult"></small>
      </section>

      <section class="card hidden" id="adminControls">
        <h2>Admin Controls</h2>
        <input id="connectorName" placeholder="Connector key name" />
        <input id="connectorPlatform" placeholder="Connector platform (x, facebook, ...)" />
        <button id="createConnectorKey">Create Connector Key</button>
        <small id="connectorKeyResult"></small>
      </section>
    </div>

    <div class="grid">
      <section class="card">
        <h2>Live Mention Feed</h2>
        <div id="mentions"></div>
      </section>
      <section class="card">
        <h2>Harmful Alerts</h2>
        <div id="alerts"></div>
      </section>
      <section class="card">
        <h2>KOL Leaderboard</h2>
        <button id="refreshKols">Refresh KOLs</button>
        <div id="kols"></div>
      </section>
    </div>

    <script>
      const token = localStorage.getItem("narrative_token") || "";
      if (!token) window.location.replace("/login");

      const identityEl = document.getElementById("identity");
      const mentionsEl = document.getElementById("mentions");
      const alertsEl = document.getElementById("alerts");
      const kolsEl = document.getElementById("kols");
      const scanSectionEl = document.getElementById("scanSection");
      const scanResultEl = document.getElementById("scanResult");
      const adminControlsEl = document.getElementById("adminControls");
      const connectorKeyResultEl = document.getElementById("connectorKeyResult");
      const refreshKolsButton = document.getElementById("refreshKols");
      let currentRole = "";
      let stream = null;

      function esc(text) {
        return String(text).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
      }

      function clearSessionAndRedirect() {
        if (stream) stream.close();
        localStorage.removeItem("narrative_token");
        window.location.replace("/login");
      }

      async function api(path, options = {}) {
        const headers = Object.assign({}, options.headers || {}, { Authorization: `Bearer ${token}` });
        const res = await fetch(path, { ...options, headers });
        if (!res.ok) {
          let detail = `Request failed ${res.status}`;
          try {
            const payload = await res.json();
            if (payload.detail) detail = payload.detail;
          } catch (_) {}
          if (res.status === 401) {
            clearSessionAndRedirect();
            throw new Error("Session expired");
          }
          throw new Error(detail);
        }
        return res;
      }

      async function loadMentions() {
        const res = await api("/api/monitoring/mentions");
        const data = await res.json();
        mentionsEl.innerHTML = data.map((row) => `
          <div class="item">
            <b>${esc(row.author_handle)}</b> on ${esc(row.platform)}
            ${row.is_harmful ? '<span class="pill harmful">harmful</span>' : ""}
            <div>${esc(row.content)}</div>
            <small>topic=${esc(row.topic)} sentiment=${row.sentiment_score} harmful=${row.harmful_claim_score}</small>
          </div>
        `).join("");
      }

      async function loadAlerts() {
        const res = await api("/api/monitoring/alerts");
        const data = await res.json();
        alertsEl.innerHTML = data.map((row) => `
          <div class="item">
            <b>${esc(row.author_handle)}</b> ${esc(row.platform)}
            <span class="pill harmful">harmful=${row.harmful_claim_score}</span>
            <div>${esc(row.content)}</div>
          </div>
        `).join("");
      }

      async function loadKols() {
        const res = await api("/api/kols/leaderboard");
        const data = await res.json();
        kolsEl.innerHTML = data.map((row) => `
          <div class="item">
            <b>${esc(row.handle)}</b><span class="pill">${esc(row.tier)}</span>
            <div>${esc(row.constituency)} | score=${row.influence_score} | followers=${row.followers}</div>
          </div>
        `).join("");
      }

      async function refreshAll() {
        await Promise.all([loadMentions(), loadAlerts(), loadKols()]);
      }

      function connectStream() {
        if (stream) stream.close();
        stream = new EventSource(`/api/monitoring/stream?token=${encodeURIComponent(token)}`);
        stream.onmessage = (event) => {
          const data = JSON.parse(event.data);
          if (data.type === "mention_ingested") refreshAll().catch(console.error);
        };
        stream.onerror = () => {
          if (stream) stream.close();
          stream = null;
        };
      }

      document.getElementById("logoutBtn").addEventListener("click", clearSessionAndRedirect);

      document.getElementById("mentionForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
          const payload = Object.fromEntries(new FormData(e.target).entries());
          payload.followers = Number(payload.followers || 0);
          payload.engagement_rate = Number(payload.engagement_rate || 0);
          await api("/api/mentions", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          e.target.reset();
          await refreshAll();
        } catch (err) {
          alert(err.message);
        }
      });

      document.getElementById("campaignForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
          const payload = Object.fromEntries(new FormData(e.target).entries());
          await api("/api/campaigns", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          e.target.reset();
          alert("Campaign created");
        } catch (err) {
          alert(err.message);
        }
      });

      refreshKolsButton.addEventListener("click", () => {
        loadKols().catch((err) => alert(err.message));
      });

      document.getElementById("scanForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
          const payload = Object.fromEntries(new FormData(e.target).entries());
          payload.batch_size_per_platform = Number(payload.batch_size_per_platform || 2);
          payload.platforms = String(payload.platforms || "")
            .split(",")
            .map((x) => x.trim())
            .filter(Boolean);
          if (!payload.platforms.length) payload.platforms = ["x", "facebook", "whatsapp", "instagram", "telegram", "tiktok"];
          const res = await api("/api/connectors/scan-all", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          scanResultEl.textContent = `Scanned ${data.scanned_platforms.join(", ")} and created ${data.mentions_created} mentions`;
          await refreshAll();
        } catch (err) {
          alert(err.message);
        }
      });

      document.getElementById("createConnectorKey").addEventListener("click", async () => {
        try {
          const name = document.getElementById("connectorName").value.trim();
          const platform = document.getElementById("connectorPlatform").value.trim();
          if (!name || !platform) return alert("Connector name and platform are required");
          const res = await api("/api/admin/connector-keys", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, platform }),
          });
          const data = await res.json();
          connectorKeyResultEl.textContent = `Key created: ${data.name} token=${data.token}`;
        } catch (err) {
          alert(err.message);
        }
      });

      async function bootstrap() {
        try {
          const meRes = await api("/api/auth/me");
          const me = await meRes.json();
          currentRole = me.role || "";
          identityEl.textContent = `Logged in as ${me.email} (${currentRole})`;
          adminControlsEl.classList.toggle("hidden", currentRole !== "admin");
          scanSectionEl.classList.toggle("hidden", !["admin", "coordinator", "analyst"].includes(currentRole));
          await refreshAll();
          connectStream();
        } catch (err) {
          clearSessionAndRedirect();
        }
      }

      bootstrap();
    </script>
  </body>
</html>
